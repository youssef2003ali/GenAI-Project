version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    depends_on:
      - fastapi
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - acs-network

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./packages:/app/packages
      - ./prompts:/app/prompts
    command: ["uv", "run", "uvicorn", "packages.backend.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      - redis
    networks:
      - acs-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - acs-network

networks:
  acs-network:
    driver: bridge
