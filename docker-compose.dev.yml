version: '3.8'

services:
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8006:8000"
    env_file: .env
    volumes:
      - ./packages:/app/packages
      - ./prompts:/app/prompts
    command: ["uv", "run", "uvicorn", "packages.backend.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      - redis
    networks:
      - acs-dev-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - acs-dev-network

networks:
  acs-dev-network:
    driver: bridge
