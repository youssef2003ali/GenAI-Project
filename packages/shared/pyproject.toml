[project]
name = "acs-shared"
version = "0.1.0"
description = "Shared schemas, models, and base agent for ACS"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "httpx>=0.27",
    "a2a-sdk>=0.1",
    "google-genai>=1.0.0",
    "litellm>=1.50.5",
    "openai>=1.0",
    "websockets>=13.0",
    "httptools==0.6.4",
]

[dependency-groups]
dev = ["pytest>=8.0"]
