[project]
name = "acs-agent-optimization"
version = "0.1.0"
description = "Optimization Agent - tone, style, and length refinement"
requires-python = ">=3.11"
dependencies = ["acs-shared", "a2a-sdk>=0.1"]

[dependency-groups]
dev = ["pytest>=8.0", "pytest-asyncio>=0.24"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
