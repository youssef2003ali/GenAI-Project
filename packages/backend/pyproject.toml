[project]
name = "acs-backend"
version = "0.1.0"
description = "FastAPI backend for Agentic Content System"
requires-python = ">=3.11"
dependencies = [
    "acs-shared",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "redis>=5.0",
    "sqlalchemy>=2.0",
    "alembic>=1.13",
    "psycopg2-binary>=2.9",
    "httpx>=0.27",
]

[dependency-groups]
dev = ["pytest>=8.0"]
