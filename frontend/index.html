<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agentic Content System</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- HEADER -->
  <header class="app-header">
    <h1>Agentic Content System</h1>
    <div style="display:flex;align-items:center;gap:0.75rem;">
      <span id="job-id-display" class="status-badge">Ready</span>
    </div>
  </header>

  <!-- MAIN -->
  <div class="main-container">
    <!-- Input -->
    <section class="input-section">
      <h2>Generate Content</h2>
      <form id="generate-form" class="input-row">
        <input
          id="topic-input"
          type="text"
          placeholder="Enter a topic (e.g., Quantum Computing, Climate Change, Renaissance Art)..."
          required
        />
        <button id="generate-btn" type="submit" class="btn btn-primary">
          Generate Content
        </button>
      </form>
    </section>

    <!-- Pipeline Visualization -->
    <section id="pipeline-visual" class="pipeline-visual">
      <!-- Dynamically rendered -->
    </section>

    <!-- Error banner -->
    <div id="error-banner" class="error-banner"></div>

    <!-- Output Panels -->
    <div class="output-grid">
      <div class="output-panel" id="panel-research">
        <div class="output-panel-header">
          <span><span class="agent-badge badge-research">🔍</span> Research</span>
          <span id="badge-research" class="status-badge">Pending</span>
        </div>
        <div id="panel-body-research" class="output-panel-body empty">
          Awaiting pipeline start...
        </div>
      </div>

      <div class="output-panel" id="panel-planning">
        <div class="output-panel-header">
          <span><span class="agent-badge badge-planning">📋</span> Planning</span>
          <span id="badge-planning" class="status-badge">Pending</span>
        </div>
        <div id="panel-body-planning" class="output-panel-body empty">
          Awaiting pipeline start...
        </div>
      </div>

      <div class="output-panel" id="panel-writing">
        <div class="output-panel-header">
          <span><span class="agent-badge badge-writing">✍️</span> Writing</span>
          <span id="badge-writing" class="status-badge">Pending</span>
        </div>
        <div id="panel-body-writing" class="output-panel-body empty">
          Awaiting pipeline start...
        </div>
      </div>

      <div class="output-panel" id="panel-editing">
        <div class="output-panel-header">
          <span><span class="agent-badge badge-editing">📝</span> Editing</span>
          <span id="badge-editing" class="status-badge">Pending</span>
        </div>
        <div id="panel-body-editing" class="output-panel-body empty">
          Awaiting pipeline start...
        </div>
      </div>

      <div class="output-panel" id="panel-optimization" style="grid-column: 1 / -1;">
        <div class="output-panel-header">
          <span><span class="agent-badge badge-optimization">✨</span> Optimization</span>
          <span id="badge-optimization" class="status-badge">Pending</span>
        </div>
        <div id="panel-body-optimization" class="output-panel-body empty">
          Awaiting pipeline start...
        </div>
      </div>
    </div>

    <!-- Final Result -->
    <section id="result-section" class="result-section">
      <h2>✅ Final Output</h2>
      <div id="result-content" class="result-content"></div>
    </section>
  </div>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/state.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
